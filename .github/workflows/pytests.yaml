name: Python Unit tests

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  tests:
    strategy:
      matrix:
        python-version:
          - "3.11"
          - "3.12"

    uses: joselsegura/processing-tools/.github/workflows/pytests.yaml@add-pytest-example
    with:
      python_version: ${{ matrix.python-version }}
      packages: ccx_messaging
      coverage_threshold: 70
